name: Build Oleh Groovy Editor (Portable)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-portable:
    runs-on: windows-latest
    env:
      CARGO_HTTP_CHECK_REVOKE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Package portable zip
        shell: pwsh
        run: |
          $distRoot = "dist"
          $appDir = Join-Path $distRoot "OlehGroovyEditor"
          New-Item -ItemType Directory -Path $appDir -Force | Out-Null

          $exePath = "target/release/oleh-groovy-editor.exe"
          if (-not (Test-Path $exePath)) {
            throw "Could not find release executable."
          }

          Copy-Item $exePath (Join-Path $appDir "oleh-groovy-editor.exe") -Force
          Copy-Item "portable/OlehGroovyEditor.bat" (Join-Path $appDir "OlehGroovyEditor.bat") -Force
          Copy-Item "README.md" (Join-Path $appDir "README.md") -Force

          $zipPath = Join-Path $distRoot "OlehGroovyEditor-windows-portable.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$appDir/*" -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OlehGroovyEditor-windows-portable
          path: dist/OlehGroovyEditor-windows-portable.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OlehGroovyEditor-windows-portable.zip
          generate_release_notes: true
